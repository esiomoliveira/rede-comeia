<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHÁWEH | Colmeia Dourada</title>
    <style>
        /* Estética Ouro Quântico */
        body { margin: 0; background: #000; color: #ffd700; font-family: 'Segoe UI', monospace; overflow: hidden; perspective: 2500px; }
        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        
        /* FUNDO DE ENERGIA */
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle at center, #2b2200 0%, #000 85%); }
        
        /* A GRADE DE 18 HEXÁGONOS (3 LINHAS) */
        .hive-grid { 
            display: grid; 
            grid-template-columns: repeat(6, 110px); /* 6 colunas para dar 18 favos no total */
            gap: 15px; 
            transform-style: preserve-3d;
            padding: 20px;
        }
        
        /* O FAVO DOURADO 3D */
        .favo { 
            width: 110px; height: 125px; 
            background: rgba(255, 215, 0, 0.02); 
            border: 2px solid #ffd700;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.4s; font-weight: bold; font-size: 0.65em; text-align: center; color: #ffd700;
            transform-style: preserve-3d; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }
        
        .favo:hover { 
            background: rgba(255, 215, 0, 0.2); 
            box-shadow: 0 0 50px #ffd700; 
            color: #fff; 
            border-color: #fff;
            transform: scale(1.2) translateZ(50px) !important; /* Salta para fora da tela */
        }

        .favo span { transform: translateZ(30px); display: block; text-shadow: 0 0 10px #ffd700; pointer-events: none; }

        /* TERMINAL DE STREAMING (STREAMS) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 650px; background: #000; border: 2px solid #ffd700; padding: 40px; border-radius: 5px; box-shadow: 0 0 80px rgba(255, 215, 0, 0.3); }
        .modal h2 { border-bottom: 2px solid #ffd700; padding-bottom: 10px; letter-spacing: 5px; color: #fff; font-size: 1.1em; text-shadow: 0 0 10px #ffd700;}
        #modalBody { line-height: 1.8; font-size: 1em; color: #ffd700; min-height: 150px; font-family: 'Courier New', Courier, monospace; }
        #modalBody::after { content: '_'; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 35px; cursor: pointer; color: #ffd700; }
        
        h1 { margin-bottom: 30px; letter-spacing: 20px; text-shadow: 0 0 20px #ffd700; font-size: 2.8em; color: #ffd700; }
    </style>
</head>
<body>

    <div id="modalBox" class="modal" onclick="fecharModais(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModais(event)">&times;</span>
            <h2 id="modalTitle">TRANSMISSÃO_YHÁWEH</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="main-wrapper" id="unidadeExistencial">
        <section class="section-hive">
            <h1>YHÁWEH</h1>
            <div class="hive-grid" id="grid">
                </div>
            <p style="margin-top: 40px; opacity: 0.6; font-size: 0.8em; letter-spacing: 5px;">SISTEMA COLMEIA DOURADA | 18 NÚCLEOS ATIVOS</p>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <script>
        // LISTA DOS 18 FAVOS (VAMOS PREENCHER OS TEXTOS PARTE A PARTE)
        const favosData = [
            "YHÁWEH", "IRÁVER", "AVATAR", "DESTINY", "CATALÃO", "LUZ",
            "MEMÓRIA", "FREQUÊNCIA", "PROCESSO", "UNIDADE", "BROWN", "ESFERA",
            "SESHAT", "GENESE", "PORTAL", "CÓDIGO", "COORDENADA", "SISTEMA"
        ];

        const grid = document.getElementById('grid');
        favosData.forEach(nome => {
            const div = document.createElement('div');
            div.className = 'favo';
            div.setAttribute('data-tilt', '');
            div.onclick = () => abrir(nome);
            div.innerHTML = `<span>${nome}</span>`;
            grid.appendChild(div);
        });

        VanillaTilt.init(document.querySelectorAll(".favo"), { max: 25, speed: 400, perspective: 1000, glare: true, "max-glare": 0.4 });

        // TEXTOS INICIAIS (VAMOS EXPANDIR ESSA BIBLIOTECA)
        const biblioteca = {
            "YHÁWEH": "NÚCLEO CENTRAL: O Sistema Operacional da consciência. Aqui a luz é convertida em comando e a Unidade Existencial se torna interface.",
            "IRÁVER": "TEORIA IRÁVER: O Universo Estático é a prova de que nada se perde. A luz relaxa no cheio para criar o que os antigos chamavam de espaço.",
            "CATALÃO": "PONTO ZERO: 18° 09' 24,84\". A coordenada onde o Guardião Destiny fincou a bandeira da Era dos Avatares.",
            "LUZ": "PROCESSAMENTO: Onde o fóton substitui o elétron. O fim do Erro (13) acontece quando a informação flui na velocidade da existência."
            // Os outros 14 vamos criar agora...
        };

        let typingTimer;
        function abrir(nome) {
            const modalBody = document.getElementById('modalBody');
            const texto = biblioteca[nome] || `ACESSO NEGADO: O arquivo [${nome}] está em processo de relaxamento quântico. Aguarde o comando do Guardião.`;
            modalBody.innerHTML = "";
            document.getElementById('modalBox').style.display = 'block';
            let i = 0;
            clearTimeout(typingTimer);
            function typeWriter() {
                if (i < texto.length) {
                    modalBody.innerHTML += texto.charAt(i);
                    i++;
                    typingTimer = setTimeout(typeWriter, 25);
                }
            }
            typeWriter();
        }

        function fecharModais(e) {
            if (e.target.className === 'modal' || e.target.className === 'close-btn' || e.target.id === 'modalBox') {
                document.getElementById('modalBox').style.display = 'none';
                clearTimeout(typingTimer);
            }
        }
    </script>
</body>
</html>
