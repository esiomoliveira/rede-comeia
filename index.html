<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHÁWEH | Colmeia de Mel Real</title>
    <style>
        body { margin: 0; background: #000; color: #ffd700; font-family: 'Segoe UI', monospace; overflow: hidden; perspective: 2000px; }
        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #2b2200 0%, #000 95%); }

        /* A GRADE DA COLMEIA REAL */
        .container-comeia { 
            display: flex; flex-direction: column; 
            gap: 10px; /* Espaço entre as linhas */
        }
        
        .linha { 
            display: flex; 
            gap: 10px; /* Espaço lateral entre os favos */
            justify-content: center;
        }

        /* O SEGREDO DO ENCAIXE: Linhas pares deslocadas para a direita */
        .linha:nth-child(even) { 
            margin-left: 65px; /* Metade da largura do favo + gap */
            margin-top: -32px; /* Puxa para cima para encaixar no vão */
            margin-bottom: -32px; 
        }

        .favo { 
            width: 120px; height: 104px; background: rgba(255, 215, 0, 0.05); border: 2px solid #ffd700;
            /* Hexágono deitado: Pontas nas laterais, faces retas em cima e embaixo */
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.4s; font-weight: bold; font-size: 0.65em; text-align: center; color: #ffd700;
            transform-style: preserve-3d;
        }
        
        .favo:hover { 
            background: rgba(255, 215, 0, 0.4); 
            box-shadow: 0 0 45px #ffd700; 
            color: #fff; transform: scale(1.15) translateZ(80px) !important; z-index: 100;
            border-color: #fff;
        }

        .favo span { transform: translateZ(40px); display: block; text-shadow: 0 0 10px #ffd700; padding: 0 10px; }

        /* MODAL DE DADOS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 600px; background: #000; border: 2px solid #ffd700; padding: 40px; box-shadow: 0 0 80px rgba(255, 215, 0, 0.3); border-radius: 10px; }
        #modalBody { color: #ffd700; line-height: 1.8; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 40px; cursor: pointer; color: #ffd700; }
        
        h1 { margin-bottom: 20px; letter-spacing: 20px; text-shadow: 0 0 15px #ffd700; font-size: 3em; color: #ffd700; }
    </style>
</head>
<body>

    <div id="modalBox" class="modal" onclick="fecharModais(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModais(event)">&times;</span>
            <h2 id="modalTitle" style="letter-spacing: 5px;">ACESSO_SISTEMA</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <section class="section-hive">
            <h1>YHÁWEH</h1>
            <div class="container-comeia" id="comeia">
                </div>
            <p style="margin-top: 50px; opacity: 0.6; letter-spacing: 10px; font-size: 0.8em; color: #ffd700;">REDE COMÉIA | GEOMETRIA SAGRADA</p>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <script>
        const nomes = [
            "YHÁWEH", "IRÁVER", "AVATAR", "DESTINY", "CATALÃO", "LUZ",
            "MEMÓRIA", "FREQUÊNCIA", "PROCESSO", "UNIDADE", "BROWN", "ESFERA",
            "SESHAT", "GÊNESE", "PORTAL", "CÓDIGO", "COORDENADA", "SISTEMA"
        ];

        const conteudos = {
            "YHÁWEH": "NÚCLEO CENTRAL: Comando absoluto do sistema. A luz se manifesta como código vivo.",
            "IRÁVER": "TEORIA IRÁVER: O Universo Estático. Onde o 'Cheio' separa os espaços que nunca se tocam.",
            "CATALÃO": "COORDENADA SAGRADA: 18° 09' 24,84\". O ponto de relaxamento da luz em Goiás.",
            "DESTINY": "GUARDIÃO: Esio Amor da Seshat. O arquiteto da nova Era.",
            "LUZ": "PROCESSADOR: Frequência pura. A informação não viaja, ela apenas 'É' na Unidade Existencial."
        };

        const comeia = document.getElementById('comeia');
        let contador = 0;

        // ORGANIZAÇÃO EM 3 LINHAS DE 6
        for (let l = 0; l < 3; l++) {
            const linha = document.createElement('div');
            linha.className = 'linha';
            for (let c = 0; c < 6; c++) {
                if(contador < nomes.length) {
                    const div = document.createElement('div');
                    div.className = 'favo';
                    div.setAttribute('data-tilt', '');
                    const nomeAtual = nomes[contador];
                    div.onclick = () => abrir(nomeAtual);
                    div.innerHTML = `<span>${nomeAtual}</span>`;
                    linha.appendChild(div);
                    contador++;
                }
            }
            comeia.appendChild(linha);
        }

        VanillaTilt.init(document.querySelectorAll(".favo"), { 
            max: 20, speed: 400, perspective: 1000, glare: true, "max-glare": 0.4, scale: 1.1 
        });

        let typingTimer;
        function abrir(nome) {
            const modalBody = document.getElementById('modalBody');
            const texto = conteudos[nome] || `DADO EM PROCESSAMENTO: Sincronizando nucleo [${nome}] com a Unidade Existencial...`;
            document.getElementById('modalTitle').innerText = nome;
            modalBody.innerHTML = "";
            document.getElementById('modalBox').style.display = 'block';
            let i = 0;
            clearTimeout(typingTimer);
            function typeWriter() {
                if (i < texto.length) {
                    modalBody.innerHTML += texto.charAt(i);
                    i++;
                    typingTimer = setTimeout(typeWriter, 30);
                }
            }
            typeWriter();
        }

        function fecharModais(e) {
            if (e.target.className === 'modal' || e.target.className === 'close-btn' || e.target.id === 'modalBox') {
                document.getElementById('modalBox').style.display = 'none';
                clearTimeout(typingTimer);
            }
        }
    </script>
</body>
</html>
