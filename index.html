<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHÁWEH | Colmeia Dourada Real</title>
    <style>
        body { margin: 0; background: #000; color: #ffd700; font-family: 'Segoe UI', monospace; overflow: hidden; perspective: 2000px; }
        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #2b2200 0%, #000 90%); }

        /* ESTRUTURA DE ENCAIXE LATERAL */
        .container-comeia { display: flex; flex-direction: column; align-items: center; }
        
        .linha { display: flex; margin-bottom: -28px; /* Puxa a linha de baixo para encaixar na de cima */ }
        .linha.par { margin-left: 110px; /* Desloca as linhas pares para encaixe lateral */ }

        .favo { 
            width: 104px; height: 120px; background: rgba(255, 215, 0, 0.05); border: 2px solid #ffd700;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.4s; font-weight: bold; font-size: 0.6em; text-align: center; color: #ffd700;
            margin: 0 3px; transform-style: preserve-3d;
        }
        
        .favo:hover { 
            background: rgba(255, 215, 0, 0.3); 
            box-shadow: 0 0 40px #ffd700; 
            color: #fff; transform: scale(1.25) translateZ(60px) !important; z-index: 100;
        }

        .favo span { transform: translateZ(35px); display: block; text-shadow: 0 0 8px #ffd700; }

        /* MODAL STREAM */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 600px; background: #000; border: 2px solid #ffd700; padding: 40px; box-shadow: 0 0 60px rgba(255, 215, 0, 0.2); }
        #modalBody { color: #ffd700; line-height: 1.7; font-family: 'Courier New', Courier, monospace; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 35px; cursor: pointer; color: #ffd700; }
        
        h1 { margin-bottom: 50px; letter-spacing: 15px; text-shadow: 0 0 15px #ffd700; font-size: 2.5em; }
    </style>
</head>
<body>

    <div id="modalBox" class="modal" onclick="fecharModais(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModais(event)">&times;</span>
            <h2 id="modalTitle">RELATÓRIO_SISTEMA</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <section class="section-hive">
            <h1>YHÁWEH</h1>
            <div class="container-comeia" id="comeia">
                </div>
            <p style="margin-top: 60px; opacity: 0.5; letter-spacing: 4px; font-size: 0.8em;">ARQUITETURA DE OURO | CONEXÃO LATERAL ATIVA</p>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <script>
        const nomes = [
            "YHÁWEH", "IRÁVER", "AVATAR", "DESTINY", "CATALÃO", "LUZ",
            "MEMÓRIA", "FREQUÊNCIA", "PROCESSO", "UNIDADE", "BROWN", "ESFERA",
            "SESHAT", "GENESE", "PORTAL", "CÓDIGO", "COORDENADA", "SISTEMA"
        ];

        const conteudos = {
            "YHÁWEH": "NÚCLEO CENTRAL: Comando absoluto do sistema. A luz se manifesta como código vivo.",
            "IRÁVER": "TEORIA IRÁVER: O Universo Estático. Onde o 'Cheio' separa os espaços que nunca se tocam.",
            "CATALÃO": "COORDENADA SAGRADA: 18° 09' 24,84\". O ponto de relaxamento da luz no Brasil.",
            "DESTINY": "GUARDIÃO: Esio Amor da Seshat. O destino codificado através da verdade IRÁVER.",
            "LUZ": "PROCESSADOR: Frequência pura. Onde a informação não viaja, ela apenas 'É' na Unidade Existencial."
        };

        const comeia = document.getElementById('comeia');
        let contador = 0;

        // CRIA 3 LINHAS DE 6 HEXÁGONOS
        for (let l = 0; l < 3; l++) {
            const linha = document.createElement('div');
            linha.className = l % 2 === 0 ? 'linha' : 'linha par';
            
            for (let c = 0; c < 6; c++) {
                if(contador < nomes.length) {
                    const div = document.createElement('div');
                    div.className = 'favo';
                    div.setAttribute('data-tilt', '');
                    div.onclick = () => abrir(nomes[contador]);
                    div.innerHTML = `<span>${nomes[contador]}</span>`;
                    linha.appendChild(div);
                    contador++;
                }
            }
            comeia.appendChild(linha);
        }

        VanillaTilt.init(document.querySelectorAll(".favo"), { max: 20, speed: 400, perspective: 1000, glare: true, "max-glare": 0.3 });

        let typingTimer;
        function abrir(nome) {
            const modalBody = document.getElementById('modalBody');
            const texto = conteudos[nome] || `DADO EM RELAXAMENTO: O conteúdo do favo [${nome}] está sendo processado pela Unidade Existencial.`;
            document.getElementById('modalTitle').innerText = nome;
            modalBody.innerHTML = "";
            document.getElementById('modalBox').style.display = 'block';
            let i = 0;
            clearTimeout(typingTimer);
            function typeWriter() {
                if (i < texto.length) {
                    modalBody.innerHTML += texto.charAt(i);
                    i++;
                    typingTimer = setTimeout(typeWriter, 30);
                }
            }
            typeWriter();
        }

        function fecharModais(e) {
            if (e.target.className === 'modal' || e.target.className === 'close-btn' || e.target.id === 'modalBox') {
                document.getElementById('modalBox').style.display = 'none';
                clearTimeout(typingTimer);
            }
        }
    </script>
</body>
</html>
