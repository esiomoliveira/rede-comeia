<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHÁWEH | Rede Coméia</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: transform 0.6s ease-in-out; }
        
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #001a1a 0%, #000 80%); }
        .hive-grid { display: grid; grid-template-columns: repeat(3, 110px); gap: 15px; }
        
        .favo { 
            width: 100px; height: 115px; background: rgba(0, 255, 255, 0.05); border: 2px solid #0ff;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.3s; font-weight: bold; font-size: 0.7em; text-align: center;
        }
        .favo:hover { transform: scale(1.2); background: rgba(0, 255, 255, 0.3); box-shadow: 0 0 20px #0ff; }

        /* MODAIS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80%; max-width: 450px; background: #000; border: 2px solid #0ff; padding: 30px; border-radius: 15px; text-align: center; }
        .close-btn { position: absolute; top: 10px; right: 20px; font-size: 30px; cursor: pointer; }
