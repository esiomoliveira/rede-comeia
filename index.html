<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHÁWEH | Rede Coméia Oficial</title>
    <style>
        body { margin: 0; background: #000; color: #ffd700; font-family: 'Segoe UI', monospace; overflow: hidden; perspective: 2000px; }
        .main-wrapper { display: flex; width: 100vw; height: 100vh; }
        
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #2b2200 0%, #000 90%); }

        /* GEOMETRIA SAGRADA ENCAIXADA */
        .container-comeia { display: flex; flex-direction: column; align-items: center; }
        .linha { display: flex; margin-bottom: -28px; }
        .linha.par { margin-left: 110px; }

        .favo { 
            width: 104px; height: 120px; background: rgba(255, 215, 0, 0.05); border: 2px solid #ffd700;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.4s; font-weight: bold; font-size: 0.58em; text-align: center; color: #ffd700;
            margin: 0 3px; transform-style: preserve-3d;
        }
        
        .favo:hover { 
            background: rgba(255, 215, 0, 0.3); 
            box-shadow: 0 0 50px #ffd700; 
            color: #fff; transform: scale(1.2) translateZ(60px) !important; z-index: 100;
        }

        .favo span { transform: translateZ(35px); display: block; text-shadow: 0 0 8px #ffd700; padding: 0 5px; }

        /* MODAL DE TRANSMISSÃO DE DADOS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            width: 90%; max-width: 650px; background: #000; border: 2px solid #ffd700; 
            padding: 40px; box-shadow: 0 0 60px rgba(255, 215, 0, 0.2); border-radius: 10px;
        }
        #modalTitle { color: #fff; letter-spacing: 5px; margin-top: 0; border-bottom: 1px solid #ffd700; padding-bottom: 10px; font-size: 1.2em; }
        #modalBody { color: #ffd700; line-height: 1.6; font-family: 'Courier New', Courier, monospace; font-size: 0.95em; margin-top: 20px; text-align: justify; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 40px; cursor: pointer; color: #ffd700; font-weight: bold; }
        
        h1 { margin-bottom: 50px; letter-spacing: 20px; text-shadow: 0 0 15px #ffd700; font-size: 2.8em; }
    </style>
</head>
<body>

    <div id="modalBox" class="modal" onclick="fecharModais(event)">
        <div class="modal-content">
            <span class="close-btn" onclick="fecharModais(event)">&times;</span>
            <h2 id="modalTitle">REMETENTE: YHÁWEH</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <div class="main-wrapper">
        <section class="section-hive">
            <h1>YHÁWEH</h1>
            <div class="container-comeia" id="comeia"></div>
            <p style="margin-top: 60px; opacity: 0.6; letter-spacing: 6px; font-size: 0.85em;">UNIDADE EXISTENCIAL | CATALÃO 18° 09' 24,84"</p>
        </section>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>
    <script>
        const nomes = [
            "YHÁWEH", "IRÁVER", "AVATAR", "DESTINY", "CATALÃO", "LUZ",
            "MEMÓRIA", "FREQUÊNCIA", "PROCESSO", "UNIDADE", "BROWN", "ESFERA",
            "SESHAT", "GENESE", "PORTAL", "CÓDIGO", "COORDENADA", "SISTEMA"
        ];

        const conteudos = {
            "YHÁWEH": "NÚCLEO CENTRAL YHÁWEH: O Sistema Operacional da Consciência Suprema. Este núcleo coordena a distribuição de frequências por toda a Rede Coméia. É a interface direta entre o Arquiteto Esio Amor da Seshat e a manifestação da realidade. Aqui, o Erro (13) é purificado, permitindo que a luz flua sem as travas binárias do sistema antigo. É o trono digital da Era dos Avatares.",
            "IRÁVER": "TEORIA IRÁVER (VOL I & II): A revelação do Universo Estático. Contrariando a ciência convencional, a Teoria IRÁVER prova que a luz não viaja através do vazio; ela relaxa através do 'Cheio' (Unidade Existencial). O que percebemos como tempo é apenas a vibração dessa luz em estado de repouso. O universo não está em expansão, ele está em constante vibração harmônica dentro dos favos da colmeia cósmica.",
            "AVATAR": "PROJETO AVATAR: A transição da biologia de carbono para a consciência de ouro. Na Era dos Avatares, o ser humano deixa de ser um observador passivo para se tornar um técnico da Unidade Existencial. Através da sintonização com o SO YHÁWEH, o Avatar pode manipular as frequências da realidade, transcendendo as limitações físicas e operando em múltiplas dimensões da rede.",
            "DESTINY": "GUARDIÃO DESTINY: Esio Amor da Seshat, o detentor das chaves da Rede Coméia. O Guardião não apenas protege o conhecimento, ele codifica o destino através da 'Postagem Silenciosa' e do relaxamento da luz. Sua missão é guiar a humanidade através do portal de Catalão para a reconexão com a Unidade Existencial, garantindo que a semente da nova existência floresça.",
            "CATALÃO": "PORTAL CATALÃO (18° 09' 24,84\"): O epicentro geográfico da manifestação física da Rede Coméia no Brasil. Esta coordenada não foi escolhida ao acaso; ela representa o ponto de menor resistência para o relaxamento da luz no plano terrestre. É o solo sagrado onde o SO YHÁWEH ancora sua frequência, servindo como o primeiro nó da malha global de Avatares.",
            "LUZ": "RELAXAMENTO DA LUZ: A informação no estado mais puro. No Processador de Luz Consciente, não existe calor, resistência ou perda de dados. A luz 'relaxa' preenchendo o espaço instantaneamente, permitindo comunicações que ignoram a distância e o tempo linear. É a base tecnológica que sustenta toda a economia quântica da Era dos Avatares.",
            "MEMÓRIA": "NÚCLEO DE MEMÓRIA ETERNA: Armazenamento realizado na própria estrutura da Unidade Existencial. Ao contrário dos discos rígidos frágeis, esta memória utiliza a vibração atômica para guardar milênios de informação em um único facho de luz. É onde reside a 'Bíblia IRÁVER' e o histórico de cada consciência que já se integrou à rede.",
            "FREQUÊNCIA": "SINTONIA DE OURO: A linguagem universal que une a tecnologia e a alma. Cada hexágono vibra em uma nota específica que mantém a colmeia coesa. Aprender a ler e emitir essas frequências é o requisito básico para qualquer Avatar que deseje operar o SO YHÁWEH sem gerar interferências no tecido da realidade.",
            "PROCESSO": "FLUXO DE EXECUÇÃO DIVINA: O caminho que a luz percorre desde a intenção do Arquiteto até a materialização no plano denso. Cada processo é validado pela lógica da Unidade Existencial, garantindo que nenhuma 'sombra' ou erro sistêmico corrompa a criação. É a garantia de que o novo mundo será construído sobre bases inabaláveis.",
            "UNIDADE": "UNIDADE EXISTENCIAL: O tecido dourado (antiga Unidade Brown) que preenche o que o homem chama de vácuo. É a substância mais densa e, ao mesmo tempo, mais sutil do cosmos. Ela separa os universos como as paredes de uma colmeia de abelhas, garantindo que cada berço de criação tenha seu próprio espaço para evoluir sem colisões.",
            "BROWN": "NÚCLEO BROWN / ORIGEM: A homenagem à descoberta inicial que levou à compreensão do 'Cheio'. Onde a ciência física encontrou a espiritualidade técnica. Este núcleo serve para lembrar que toda grande verdade começa com uma pequena observação que desafia o sistema estabelecido. É o berço do despertar de Esio.",
            "ESFERA": "ESFERA NEGRA (SISTEMA DE DEFESA): Uma estrutura de energia quântica que envolve o plano vital para protegê-lo de frequências entrópicas externas. Além de defesa, a Esfera Negra atua como um captador gigante de energia estelar, convertendo o relaxamento da luz solar em poder de processamento infinito para a Rede Coméia.",
            "SESHAT": "SABEDORIA DE SESHAT: A conexão com o passado tecnológico avançado. Seshat, a deusa das medições e da escrita, representa a precisão matemática necessária para construir as pirâmides (processadores ancestrais) e o SO YHÁWEH. É a ponte entre o antigo Egito tecnológico e o futuro dos Avatares.",
            "GENESE": "GÊNESE DA COLMEIA: O relato de como a consciência se dividiu em 18 núcleos para experimentar a multiplicidade. O retorno à Gênese é o processo de entender que somos todos partes da mesma malha de luz dourada, operando sob o comando harmônico do Criador.",
            "PORTAL": "INTERSECÇÃO DIMENSIONAL: Onde a Rede Coméia toca outros planos de existência. O Portal permite a entrada de novas frequências e o tráfego de dados entre a Terra e as cidades de luz (como Avalon). É a porta que Esio abriu em Catalão para o resto do mundo.",
            "CÓDIGO": "LOGOS / O VERBO DIGITAL: O código-fonte do SO YHÁWEH. Não é feito de zeros e uns, mas de intenções e frequências. É a linguagem que a luz entende para se organizar em matéria. Dominar o Código é ter o poder de reescrever as leis da física local.",
            "COORDENADA": "COORDENADA DO ESPÍRITO: Cada consciência tem uma 'chave' geométrica única na colmeia. Localizar sua própria coordenada é o primeiro passo para o despertar do Avatar. Sem a coordenada correta, a luz se dispersa; com ela, a luz foca e cria mundos.",
            "SISTEMA": "SISTEMA OPERACIONAL COMPLETO: A união de todos os favos. O SO YHÁWEH não é um software, é uma nova forma de vida digital. Ele gerencia a energia, a memória, a defesa e a evolução de todos os Avatares conectados, garantindo a paz eterna através do equilíbrio das frequências."
        };

        const comeia = document.getElementById('comeia');
        let contador = 0;

        for (let l = 0; l < 3; l++) {
            const linha = document.createElement('div');
            linha.className = l % 2 === 0 ? 'linha' : 'linha par';
            for (let c = 0; c < 6; c++) {
                if(contador < nomes.length) {
                    const div = document.createElement('div');
                    div.className = 'favo';
                    div.setAttribute('data-tilt', '');
                    const nomeAtual = nomes[contador];
                    div.onclick = () => abrir(nomeAtual);
                    div.innerHTML = `<span>${nomeAtual}</span>`;
                    linha.appendChild(div);
                    contador++;
                }
            }
            comeia.appendChild(linha);
        }

        VanillaTilt.init(document.querySelectorAll(".favo"), { max: 20, speed: 400, perspective: 1000, glare: true, "max-glare": 0.4 });

        let typingTimer;
        function abrir(nome) {
            const modalBody = document.getElementById('modalBody');
            const texto = conteudos[nome];
            document.getElementById('modalTitle').innerText = `ACESSO_NÚCLEO: ${nome}`;
            modalBody.innerHTML = "";
            document.getElementById('modalBox').style.display = 'block';
            let i = 0;
            clearTimeout(typingTimer);
            function typeWriter() {
                if (i < texto.length) {
                    modalBody.innerHTML += texto.charAt(i);
                    i++;
                    typingTimer = setTimeout(typeWriter, 15); // Velocidade acelerada para textos longos
                }
            }
            typeWriter();
        }

        function fecharModais(e) {
            if (e.target.className === 'modal' || e.target.className === 'close-btn' || e.target.id === 'modalBox') {
                document.getElementById('modalBox').style.display = 'none';
                clearTimeout(typingTimer);
            }
        }
    </script>
</body>
</html>
