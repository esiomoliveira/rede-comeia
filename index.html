<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHÁWEH | Rede Coméia</title>
    <style>
        body { margin: 0; background: #000; color: #0ff; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: transform 0.8s cubic-bezier(0.85, 0, 0.15, 1); }
        
        /* COLMEIA COM BRILHO QUÂNTICO */
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #001a1a 0%, #000 80%); }
        .hive-grid { display: grid; grid-template-columns: repeat(3, 110px); gap: 18px; perspective: 1200px; }
        
        .favo { 
            width: 100px; height: 115px; background: rgba(0, 255, 255, 0.03); border: 2px solid #0ff;
            clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); transform: rotateX(15deg) rotateY(-15deg);
            font-weight: bold; font-size: 0.75em; text-align: center; color: #0ff; text-shadow: 0 0 5px #0ff;
        }
        
        /* Efeito de Ativação da RTX 4060 */
        .favo:hover { 
            transform: scale(1.25) rotateX(0deg) rotateY(0deg); 
            background: rgba(0, 255, 255, 0.4); 
            box-shadow: 0 0 40px #0ff; 
            color: #fff; 
            border-color: #fff;
        }

        /* JANELAS DA BÍBLIA (MODAIS) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; backdrop-filter: blur(5px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 500px; background: #000; border: 3px solid #0ff; padding: 40px; box-shadow: 0 0 60px #0ff; border-radius: 25px; }
        .modal h2 { border-bottom: 2px solid #0ff; padding-bottom: 15px; color: #fff; text-transform: uppercase; letter-spacing: 3px; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 30px; cursor: pointer; color: #0ff; }

        /* SEÇÃO FEED */
        .section-feed { width: 100vw; height: 100vh; padding: 60px; box-sizing: border-box; background: #020202; overflow-y: auto; }
