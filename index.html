<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YHÁWEH | Matriz 27 Núcleos</title>
    <style>
        body { margin: 0; background: #000; color: #ffd700; font-family: 'Segoe UI', monospace; overflow: hidden; perspective: 1500px; }
        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: 0.7s cubic-bezier(0.85, 0, 0.15, 1); }
        
        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #1a1500 0%, #000 95%); }

        /* GRADE DE 27 (3 LINHAS DE 9) */
        .container-comeia { display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .linha { display: flex; margin-bottom: -20px; }
        /* Encaixe lateral perfeito para 9 favos */
        .linha:nth-child(even) { transform: translateX(56px); }

        .favo { 
            width: 108px; height: 94px; background: rgba(255, 215, 0, 0.04); border: 1px solid #ffd700;
            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
            display: flex; justify-content: center; align-items: center; cursor: pointer;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-weight: bold; font-size: 0.55em; 
            text-align: center; color: #ffd700; margin: 2px; transform-style: preserve-3d;
        }
        
        .favo:hover { 
            background: rgba(255, 215, 0, 0.4); 
            box-shadow: 0 0 40px #ffd700; 
            color: #fff; transform: scale(1.2) translateZ(70px) !important; z-index: 100;
            border-color: #fff;
        }

        .favo span { transform: translateZ(30px); pointer-events: none; text-shadow: 0 0 10px #ffd700; }

        /* INTERFACE DE DADOS (MODAL) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.97); z-index: 2000; backdrop-filter: blur(10px); }
        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 600px; background: #000; border: 2px solid #ffd700; padding: 40px; box-shadow: 0 0 60px rgba(255, 215, 0, 0.3); border-radius: 8px; }
        #modalBody { color: #ffd700; line-height: 1.8; font-family: 'Courier New', monospace; font-size: 1.1em; }
        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 40px; cursor: pointer; color: #ffd700; }
        
        h1 { margin-bottom: 30px; letter-spacing: 20px; text-shadow: 0 0 20px #ffd700; font-size: 2.8em; }
