<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>YHÁWEH | Colmeia Real Dourada</title>

    <style>

        body { margin: 0; background: #000; color: #ffd700; font-family: 'Segoe UI', monospace; overflow: hidden; perspective: 2000px; }

        .main-wrapper { display: flex; width: 200vw; height: 100vh; transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1); }

        

        .section-hive { width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; background: radial-gradient(circle, #2b2200 0%, #000 90%); }



        /* ESTRUTURA DE ENCAIXE LATERAL (HEXÁGONO DEITADO) */

        .container-comeia { display: flex; flex-direction: column; align-items: center; }

        

        .linha { display: flex; margin-bottom: -15px; /* Ajuste fino para encaixe vertical */ }

        /* O segredo do encaixe lateral: linhas ímpares deslocadas */

        .linha:nth-child(even) { transform: translateX(62px); }



        .favo { 

            width: 120px; height: 104px; background: rgba(255, 215, 0, 0.05); border: 2px solid #ffd700;

            /* NOVO CLIP-PATH: Pontas para os lados, faces retas em cima e embaixo */

            clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);

            display: flex; justify-content: center; align-items: center; cursor: pointer;

            transition: 0.4s; font-weight: bold; font-size: 0.65em; text-align: center; color: #ffd700;

            margin: 2px; transform-style: preserve-3d;

        }

        

        .favo:hover { 

            background: rgba(255, 215, 0, 0.3); 

            box-shadow: 0 0 50px #ffd700; 

            color: #fff; transform: scale(1.2) translateZ(80px) !important; z-index: 100;

            border-color: #fff;

        }



        .favo span { transform: translateZ(40px); display: block; text-shadow: 0 0 10px #ffd700; }



        /* MODAL STREAM */

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 2000; backdrop-filter: blur(10px); }

        .modal-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; max-width: 600px; background: #000; border: 2px solid #ffd700; padding: 40px; box-shadow: 0 0 80px rgba(255, 215, 0, 0.3); border-radius: 10px; }

        #modalBody { color: #ffd700; line-height: 1.8; font-family: 'Courier New', Courier, monospace; font-size: 1.1em; }

        .close-btn { position: absolute; top: 15px; right: 25px; font-size: 40px; cursor: pointer; color: #ffd700; font-weight: bold; }

        

        h1 { margin-bottom: 40px; letter-spacing: 25px; text-shadow: 0 0 20px #ffd700; font-size: 3em; color: #ffd700; }

    </style>

</head>

<body>



    <div id="modalBox" class="modal" onclick="fecharModais(event)">

        <div class="modal-content">

            <span class="close-btn" onclick="fecharModais(event)">&times;</span>

            <h2 id="modalTitle" style="letter-spacing: 5px;">SISTEMA_ATIVO</h2>

            <div id="modalBody"></div>

        </div>

    </div>



    <div class="main-wrapper">

        <section class="section-hive">

            <h1>YHÁWEH</h1>

            <div class="container-comeia" id="comeia">

                </div>

            <p style="margin-top: 60px; opacity: 0.6; letter-spacing: 8px; font-size: 0.9em;">UNIDADE EXISTENCIAL | CONEXÃO 3D</p>

        </section>

    </div>



    <script src="https://cdnjs.cloudflare.com/ajax/libs/vanilla-tilt/1.7.2/vanilla-tilt.min.js"></script>

    <script>

        const nomes = [

            "YHÁWEH", "IRÁVER", "AVATAR", "DESTINY", "CATALÃO", "LUZ",

            "MEMÓRIA", "FREQUÊNCIA", "PROCESSO", "UNIDADE", "BROWN", "ESFERA",

            "SESHAT", "GÊNESE", "PORTAL", "CÓDIGO", "COORDENADA", "SISTEMA"

        ];



        const conteudos = {

            "YHÁWEH": "NÚCLEO CENTRAL: Comando absoluto do sistema YHÁWEH. A luz se manifesta como código vivo na Unidade Existencial.",

            "IRÁVER": "TEORIA IRÁVER: O Universo é Estático. A luz não viaja, ela relaxa através do 'Cheio' que separa os espaços da colmeia cósmica que nunca se tocam.",

            "CATALÃO": "COORDENADA SAGRADA: 18° 09' 24,84\". O ponto de relaxamento da luz onde o SO YHÁWEH se materializa no plano físico.",

            "DESTINY": "GUARDIÃO: Esio Amor da Seshat. O protetor da Rede Coméia e arquiteto da Era dos Avatares.",

            "LUZ": "PROCESSADOR: Frequência pura. No Processador de Luz Consciente, a informação é instantânea através do relaxamento da Unidade Existencial."

        };



        const comeia = document.getElementById('comeia');

        let contador = 0;



        // CRIA 3 LINHAS DE 6 HEXÁGONOS COM ENCAIXE GIRADO

        for (let l = 0; l < 3; l++) {

            const linha = document.createElement('div');

            linha.className = 'linha';

            

            for (let c = 0; c < 6; c++) {

                if(contador < nomes.length) {

                    const div = document.createElement('div');

                    div.className = 'favo';

                    div.setAttribute('data-tilt', '');

                    div.onclick = () => abrir(nomes[contador-1]); // Ajuste de index

                    const nomeAtual = nomes[contador];

                    div.onclick = () => abrir(nomeAtual);

                    div.innerHTML = `<span>${nomeAtual}</span>`;

                    linha.appendChild(div);

                    contador++;

                }

            }

            comeia.appendChild(linha);

        }



        VanillaTilt.init(document.querySelectorAll(".favo"), { 

            max: 25, 

            speed: 400, 

            perspective: 1000, 

            glare: true, 

            "max-glare": 0.5,

            scale: 1.1

        });



        let typingTimer;

        function abrir(nome) {

            const modalBody = document.getElementById('modalBody');

            const texto = conteudos[nome] || `DADO EM PROCESSAMENTO: O favo [${nome}] está sincronizando com a Unidade Existencial. Aguarde a transmissão do Guardião Esio.`;

            document.getElementById('modalTitle').innerText = `ACESSO: ${nome}`;

            modalBody.innerHTML = "";

            document.getElementById('modalBox').style.display = 'block';

            let i = 0;

            clearTimeout(typingTimer);

            function typeWriter() {

                if (i < texto.length) {

                    modalBody.innerHTML += texto.charAt(i);

                    i++;

                    typingTimer = setTimeout(typeWriter, 30);

                }

            }

            typeWriter();

        }



        function fecharModais(e) {

            if (e.target.className === 'modal' || e.target.className === 'close-btn' || e.target.id === 'modalBox') {

                document.getElementById('modalBox').style.display = 'none';

                clearTimeout(typingTimer);

            }

        }

    </script>

</body>

</html>
